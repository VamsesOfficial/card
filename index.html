<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Kawan Baik Bali — Digital Card</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg1:#1C1C1E;--bg2:#2C2C2E;
  --sep:rgba(255,255,255,0.12);--sep2:rgba(255,255,255,0.06);
  --label:#fff;--label2:rgba(255,255,255,0.6);--label3:rgba(255,255,255,0.3);
  --blue:#0A84FF;--green:#30D158;--gold:#C9A96E;
  --font:-apple-system,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif;
  --r-lg:20px;--r-md:14px;
}
html{-webkit-font-smoothing:antialiased;background:#000}
body{
  background:var(--bg);color:var(--label);font-family:var(--font);
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;
  position:relative;overflow:hidden;
}

/* subtle bg glow */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(10,132,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 10% 110%, rgba(201,169,110,0.07) 0%, transparent 55%);
}

.card{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  gap:0;max-width:320px;width:100%;
  animation:fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Logo badge */
.logo-badge{
  width:72px;height:72px;border-radius:20px;
  background:var(--bg1);border:0.5px solid var(--sep);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:24px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.06);
}
.logo-badge svg{opacity:0.85}

.brand{
  font-size:1.5rem;font-weight:700;
  letter-spacing:-0.02em;margin-bottom:4px;
}
.brand span{color:var(--gold)}

.pill{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg1);border:0.5px solid var(--sep);
  border-radius:100px;padding:5px 14px;
  font-size:0.7rem;font-weight:500;color:var(--label3);
  letter-spacing:0.06em;text-transform:uppercase;
  margin-bottom:40px;
}
.pill-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.info-card{
  width:100%;background:var(--bg1);
  border:0.5px solid var(--sep);border-radius:var(--r-lg);
  padding:20px;margin-bottom:16px;
}
.info-card p{
  font-size:1rem;font-weight:400;
  color:var(--label2);line-height:1.65;
  margin-bottom:14px;
}
.info-url{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--bg2);border:0.5px solid var(--sep);
  border-radius:var(--r-md);padding:10px 16px;
}
.info-url span{font-size:0.82rem;font-family:monospace;color:var(--blue);font-weight:400}

.foot{
  font-size:0.72rem;color:var(--label3);
  font-weight:400;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo-badge">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect x="6" y="6" width="10" height="10" rx="2" fill="white" opacity="0.9"/>
      <rect x="20" y="6" width="10" height="10" rx="2" fill="white" opacity="0.5"/>
      <rect x="6" y="20" width="10" height="10" rx="2" fill="white" opacity="0.5"/>
      <rect x="20" y="20" width="4" height="4" rx="1" fill="white" opacity="0.7"/>
      <rect x="26" y="20" width="4" height="4" rx="1" fill="white" opacity="0.4"/>
      <rect x="20" y="26" width="4" height="4" rx="1" fill="white" opacity="0.4"/>
    </svg>
  </div>

  <div class="brand">Kawan Baik <span>Bali</span></div>

  <div class="pill">
    <div class="pill-dot"></div>
    Hospitality Supplier Premium
  </div>

  <div class="info-card">
    <p>Scan QR code pada kartu nama untuk membuka profil digital karyawan.</p>
    <div class="info-url">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span>card.kawanbaikbali.com</span>
    </div>
  </div>

  <div class="foot">© Kawan Baik Bali · Digital Card System</div>
</div>
</body>
</html>
