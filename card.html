<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- OG / Social Meta (populated by JS after fetch) -->
<title>Digital Card — Kawan Baik Bali</title>
<meta name="description" content="Kartu nama digital Kawan Baik Bali">
<meta property="og:type" content="profile">
<meta property="og:site_name" content="Kawan Baik Bali">
<meta property="og:title" id="ogTitle" content="Digital Card — Kawan Baik Bali">
<meta property="og:description" id="ogDesc" content="Kartu nama digital Kawan Baik Bali — Hospitality Supplier Premium">
<meta property="og:url" id="ogUrl" content="">
<meta property="og:image" id="ogImage" content="">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" id="twTitle" content="Digital Card — Kawan Baik Bali">
<meta name="twitter:description" id="twDesc" content="Kartu nama digital Kawan Baik Bali">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ios-bg:#000000;--ios-bg1:#1C1C1E;--ios-bg2:#2C2C2E;--ios-bg3:#3A3A3C;
  --ios-sep:rgba(255,255,255,0.12);--ios-sep2:rgba(255,255,255,0.06);
  --ios-label:#FFFFFF;--ios-label2:rgba(255,255,255,0.6);
  --ios-label3:rgba(255,255,255,0.3);--ios-label4:rgba(255,255,255,0.18);
  --ios-blue:#0A84FF;--ios-green:#30D158;--ios-teal:#5AC8F5;
  --ios-orange:#FF9F0A;--ios-red:#FF453A;--ios-purple:#BF5AF2;--ios-pink:#FF375F;
  --gold:#C9A96E;
  --font:-apple-system,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif;
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:28px;
  --t:0.2s cubic-bezier(.4,0,.2,1);
}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:#000}
body{background:var(--ios-bg);color:var(--ios-label);font-family:var(--font);font-weight:400;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}

/* ─── LOADING / SKELETON ─── */
#loading{position:fixed;inset:0;background:var(--ios-bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:200;transition:opacity 0.4s ease}
#loading.gone{opacity:0;pointer-events:none}
.lb{font-size:1.1rem;font-weight:600;color:var(--ios-label2);letter-spacing:-0.01em}
.ll{width:36px;height:4px;background:var(--ios-bg2);border-radius:100px;overflow:hidden}
.ll::after{content:'';display:block;width:40%;height:100%;background:var(--ios-blue);border-radius:100px;animation:iosLoad 1s ease infinite}
@keyframes iosLoad{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}

/* Skeleton shimmer */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{background:linear-gradient(90deg,var(--ios-bg2) 25%,var(--ios-bg3) 50%,var(--ios-bg2) 75%);background-size:800px 100%;animation:shimmer 1.4s ease infinite;border-radius:8px}

#skeletonWrap{display:none;width:100%;max-width:480px;padding-bottom:env(safe-area-inset-bottom)}
.sk-hero{background:var(--ios-bg1);padding:56px 24px 32px;display:flex;flex-direction:column;align-items:center;gap:12px}
.sk-avatar{width:96px;height:96px;border-radius:50%}
.sk-name{width:160px;height:22px}
.sk-pos{width:100px;height:14px}
.sk-co{width:120px;height:14px}
.sk-actions{padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--ios-bg)}
.sk-row{height:68px;border-radius:14px}
.sk-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sk-btn{height:52px;border-radius:14px}
.sk-group{margin:16px 16px 0;border-radius:20px;overflow:hidden}
.sk-item{height:56px;margin-bottom:1px}
.sk-item:last-child{margin-bottom:0}

/* ─── 404 ─── */
#notfound{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:40px 24px;text-align:center;gap:8px}
.nf-icon{font-size:4rem;margin-bottom:8px}
.nf-title{font-size:1.3rem;font-weight:600}
.nf-desc{font-size:0.9rem;color:var(--ios-label2);margin-top:4px}

/* ─── CARD WRAP ─── */
#cardWrap{display:none;width:100%;max-width:480px;animation:fadeUp 0.5s cubic-bezier(.16,1,.3,1) both;padding-bottom:env(safe-area-inset-bottom)}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@media(min-width:520px){
  body{justify-content:center;padding:32px 16px}
  #cardWrap,#skeletonWrap{border-radius:var(--r-xl);overflow:hidden;box-shadow:0 0 0 0.5px rgba(255,255,255,0.08),0 32px 80px rgba(0,0,0,0.7),0 8px 24px rgba(0,0,0,0.5);margin:auto}
}

/* ─── HERO ─── */
.hero{position:relative;padding:max(56px,calc(44px + env(safe-area-inset-top))) 24px 32px;overflow:hidden;display:flex;flex-direction:column;align-items:center;text-align:center;background:var(--ios-bg1)}
.hero-blur{position:absolute;inset:0;background:radial-gradient(ellipse 100% 80% at 50% -20%,rgba(10,132,255,0.15) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 10% 110%,rgba(48,209,88,0.06) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 90% 90%,rgba(191,90,242,0.06) 0%,transparent 50%);pointer-events:none}
.avatar-wrap{position:relative;z-index:1;margin-bottom:20px}
.avatar-ring{width:96px;height:96px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--ios-blue),var(--ios-purple),var(--ios-pink));box-shadow:0 8px 32px rgba(10,132,255,0.25),0 2px 8px rgba(0,0,0,0.4)}
.avatar-frame{width:100%;height:100%;border-radius:50%;background:var(--ios-bg2);overflow:hidden;border:2px solid var(--ios-bg1)}
.avatar-frame img{width:100%;height:100%;object-fit:cover;display:block}
.avatar-init{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.4rem;font-weight:300;color:var(--ios-label2)}
.avatar-dot{position:absolute;bottom:4px;right:4px;width:14px;height:14px;border-radius:50%;background:var(--ios-green);border:2.5px solid var(--ios-bg1);box-shadow:0 0 10px rgba(48,209,88,0.5)}
.hero-name{font-size:clamp(1.6rem,5.5vw,2rem);font-weight:700;letter-spacing:-0.02em;line-height:1.1;position:relative;z-index:1;margin-bottom:6px}
.hero-pos{font-size:0.78rem;font-weight:500;color:var(--ios-blue);letter-spacing:0.01em;position:relative;z-index:1;margin-bottom:4px}
.hero-co{font-size:0.85rem;color:var(--ios-label2);font-weight:400;position:relative;z-index:1}

/* ─── TAGLINE ─── */
.tagline{display:none;padding:16px 24px;background:var(--ios-bg1);border-top:0.5px solid var(--ios-sep2);border-bottom:0.5px solid var(--ios-sep2);text-align:center}
.tagline-text{font-size:0.92rem;color:var(--ios-label2);line-height:1.6;font-weight:400;font-style:italic}

/* ─── QUICK ACTIONS ─── */
.actions{padding:16px 16px 8px;background:var(--ios-bg);display:flex;flex-direction:column;gap:10px}
.action-grid{display:grid;gap:10px}
.abtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:14px 8px;background:var(--ios-bg1);border:0.5px solid var(--ios-sep);color:var(--ios-label2);font-family:var(--font);font-size:0.68rem;font-weight:500;letter-spacing:0.01em;text-decoration:none;cursor:pointer;transition:all var(--t);border-radius:var(--r-md);-webkit-tap-highlight-color:transparent;min-height:68px;outline:none;user-select:none}
.abtn:active{transform:scale(0.96);opacity:0.8}
.abtn svg{flex-shrink:0}
.abtn.wa svg{color:var(--ios-green)}
.abtn.em svg{color:var(--ios-blue)}
.abtn.wb svg{color:var(--ios-teal)}
.abtn.sh svg{color:var(--ios-orange)}
.abtn.cta{flex-direction:row;gap:10px;min-height:52px;padding:14px 18px;font-size:0.82rem;border-radius:var(--r-md)}
.abtn.cta-save{background:var(--ios-blue);border-color:var(--ios-blue);color:#fff;box-shadow:0 4px 16px rgba(10,132,255,0.3)}
.abtn.cta-save:active{background:rgba(10,132,255,0.85)}
.abtn.cta-copy{background:var(--ios-bg2);border-color:var(--ios-sep);color:var(--ios-label)}
.abtn.cta-copy:active{background:var(--ios-bg3)}

/* ─── GROUPED LIST ─── */
.ios-group{background:var(--ios-bg1);border-radius:var(--r-lg);overflow:hidden;border:0.5px solid var(--ios-sep)}
.ios-group-label{font-size:0.72rem;font-weight:600;color:var(--ios-label3);text-transform:uppercase;letter-spacing:0.06em;padding:0 20px 8px;margin-top:24px}
.ci{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:0.5px solid var(--ios-sep2);text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent;cursor:default;transition:background var(--t)}
.ci:last-child{border-bottom:none}
.ci.link{cursor:pointer}
.ci.link:active{background:rgba(255,255,255,0.05)}
.ci-icon{width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:8px}
.ci-phone .ci-icon{background:var(--ios-green);color:#fff}
.ci-email .ci-icon{background:var(--ios-blue);color:#fff}
.ci-web   .ci-icon{background:var(--ios-teal);color:#fff}
.ci-addr  .ci-icon{background:var(--ios-orange);color:#fff}
.ci-body{flex:1;min-width:0}
.ci-label{font-size:0.7rem;font-weight:500;color:var(--ios-label3);display:block;margin-bottom:1px}
.ci-val{font-size:0.9rem;word-break:break-word;font-weight:400;line-height:1.35}
.ci-arr{color:var(--ios-label3);flex-shrink:0}

/* ─── SOCIALS ─── */
.schip{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--ios-bg1);border-bottom:0.5px solid var(--ios-sep2);color:var(--ios-label);text-decoration:none;font-size:0.9rem;font-weight:400;transition:background var(--t);-webkit-tap-highlight-color:transparent}
.schip:last-child{border-bottom:none}
.schip-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.schip.ig .schip-icon{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.schip.li .schip-icon{background:#0077B5}
.schip-icon svg{color:#fff}
.schip:active{background:rgba(255,255,255,0.05)}
.schip-arr{margin-left:auto;color:var(--ios-label3)}

/* ─── FOOTER ─── */
.card-foot{margin:20px 16px 24px;padding:16px 18px;background:var(--ios-bg1);border-radius:var(--r-lg);border:0.5px solid var(--ios-sep);display:flex;align-items:center;justify-content:space-between}
.foot-brand{font-size:0.95rem;font-weight:600;letter-spacing:-0.01em}
.foot-sub{font-size:0.7rem;color:var(--ios-label3);margin-top:2px;font-weight:400}
.foot-badge{display:flex;align-items:center;gap:6px;background:var(--ios-bg2);border:0.5px solid var(--ios-sep);border-radius:100px;padding:5px 12px}
.foot-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--ios-green);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.3)}}
.foot-badge-text{font-size:0.65rem;font-weight:500;color:var(--ios-label3);letter-spacing:0.04em}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:max(32px,calc(20px + env(safe-area-inset-bottom)));left:50%;transform:translateX(-50%) translateY(10px);background:rgba(44,44,46,0.92);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);color:#fff;padding:10px 20px;font-size:0.82rem;font-weight:500;border-radius:100px;border:0.5px solid var(--ios-sep);opacity:0;transition:all 0.25s ease;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:380px){.hero-name{font-size:1.5rem}.abtn{min-height:60px}}
</style>
</head>
<body>

<div id="loading">
  <div class="lb">Kawan Baik Bali</div>
  <div class="ll"></div>
</div>

<!-- SKELETON -->
<div id="skeletonWrap">
  <div class="sk-hero">
    <div class="skeleton sk-avatar"></div>
    <div class="skeleton sk-name"></div>
    <div class="skeleton sk-pos"></div>
    <div class="skeleton sk-co"></div>
  </div>
  <div class="sk-actions">
    <div class="skeleton sk-row"></div>
    <div class="sk-btns">
      <div class="skeleton sk-btn"></div>
      <div class="skeleton sk-btn"></div>
    </div>
  </div>
  <div class="sk-group">
    <div class="skeleton sk-item"></div>
    <div class="skeleton sk-item"></div>
    <div class="skeleton sk-item"></div>
  </div>
</div>

<div id="notfound">
  <div class="nf-icon">🔍</div>
  <h2 class="nf-title">Card tidak ditemukan</h2>
  <p class="nf-desc">Link tidak aktif atau sudah dihapus</p>
</div>

<div id="cardWrap">
  <div class="hero">
    <div class="hero-blur"></div>
    <div class="avatar-wrap">
      <div class="avatar-ring">
        <div class="avatar-frame" id="avatarFrame">
          <div class="avatar-init" id="avatarInit">K</div>
        </div>
      </div>
      <div class="avatar-dot"></div>
    </div>
    <h1 class="hero-name" id="pName">—</h1>
    <p class="hero-pos" id="pPos"></p>
    <p class="hero-co" id="pCo">Kawan Baik Bali</p>
  </div>

  <div class="tagline" id="taglineWrap">
    <p class="tagline-text" id="taglineText"></p>
  </div>

  <div class="actions">
    <div class="action-grid" id="grid3" style="grid-template-columns:repeat(3,1fr)"></div>
    <div class="action-grid" style="grid-template-columns:1fr 1fr">
      <button class="abtn cta cta-save" onclick="saveContact()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Simpan Kontak
      </button>
      <button class="abtn cta cta-copy" onclick="shareCard()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Bagikan
      </button>
    </div>
  </div>

  <div class="ios-group-label" id="contactLabel" style="display:none">Informasi Kontak</div>
  <div class="ios-group" id="contactList"></div>

  <div class="ios-group-label" id="socialLabel" style="display:none">Media Sosial</div>
  <div class="ios-group social-group" id="socialWrap" style="display:none"></div>

  <div class="card-foot">
    <div>
      <div class="foot-brand">Kawan Baik Bali</div>
      <div class="foot-sub">Hospitality Supplier · Bali</div>
    </div>
    <div class="foot-badge">
      <div class="foot-badge-dot"></div>
      <div class="foot-badge-text">Digital Card</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://uyjkarfzkngamepxvpvd.supabase.co';
const SUPA_KEY='sb_publishable_nWlelzglezZOa6rU5fXqBw_V93XVlCY';
let D=null;

function getSlug(){return window.location.pathname.replace(/^\/+|\/+$/g,'')||null}

async function fetchCard(slug){
  const res=await fetch(`${SUPA_URL}/rest/v1/cards?slug=eq.${encodeURIComponent(slug)}&select=*&limit=1`,{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
  });
  if(!res.ok)throw new Error('fetch error');
  const data=await res.json();
  return data&&data.length?data[0]:null;
}

window.addEventListener('DOMContentLoaded',async()=>{
  const slug=getSlug();
  if(!slug){showNotFound();return;}
  // Show skeleton while loading
  document.getElementById('loading').classList.add('gone');
  document.getElementById('skeletonWrap').style.display='block';
  try{
    D=await fetchCard(slug);
    document.getElementById('skeletonWrap').style.display='none';
    if(!D){showNotFound();return;}
    updateMetaTags(D);
    renderCard(D);
    document.getElementById('cardWrap').style.display='block';
    trackView(D);
  }catch(e){
    document.getElementById('skeletonWrap').style.display='none';
    showNotFound();
  }
});

function showNotFound(){
  document.getElementById('loading').classList.add('gone');
  document.getElementById('notfound').style.display='flex';
}

function updateMetaTags(d){
  const title=`${d.name} — ${d.company||'Kawan Baik Bali'}`;
  const desc=d.tagline||`${d.position||''}${d.position&&d.company?' · ':''}${d.company||'Kawan Baik Bali'} · Kartu nama digital`;
  const url=window.location.href;
  document.title=title;
  document.querySelector('meta[name="description"]').content=desc;
  document.getElementById('ogTitle').content=title;
  document.getElementById('ogDesc').content=desc;
  document.getElementById('ogUrl').content=url;
  document.getElementById('twTitle').content=title;
  document.getElementById('twDesc').content=desc;
  if(d.photo){
    document.getElementById('ogImage').content=d.photo;
  }
}

function renderCard(d){
  const frame=document.getElementById('avatarFrame');
  if(d.photo){frame.innerHTML=`<img src="${d.photo}" alt="${esc(d.name)}">`;}
  else{document.getElementById('avatarInit').textContent=(d.name||'K').charAt(0).toUpperCase();}
  document.getElementById('pName').textContent=d.name||'—';
  document.getElementById('pPos').textContent=d.position||'';
  document.getElementById('pCo').textContent=d.company||'Kawan Baik Bali';
  if(d.tagline){document.getElementById('taglineText').textContent=d.tagline;document.getElementById('taglineWrap').style.display='block';}

  // Quick actions
  const waNum=d.whatsapp?'62'+d.whatsapp.replace(/\D/g,'').replace(/^62/,''):(d.phone?d.phone.replace(/\D/g,''):'');
  const btns=[];
  if(waNum)btns.push({label:'WhatsApp',href:`https://wa.me/${waNum}`,icon:iconWA(),cls:'wa'});
  if(d.email)btns.push({label:'Email',href:`mailto:${d.email}`,icon:iconEmail(),cls:'em'});
  if(d.website)btns.push({label:'Website',href:d.website,icon:iconWeb(),cls:'wb',ext:true});
  const g3=document.getElementById('grid3');
  if(!btns.length){g3.style.display='none';}
  else{
    g3.style.gridTemplateColumns=`repeat(${Math.min(btns.length,3)},1fr)`;
    btns.forEach(b=>{
      const a=document.createElement('a');
      a.className=`abtn ${b.cls}`;a.href=b.href;
      if(b.ext||b.href.startsWith('http')){a.target='_blank';a.rel='noopener';}
      a.innerHTML=b.icon+`<span>${b.label}</span>`;
      g3.appendChild(a);
    });
  }

  // Contact list
  const cl=document.getElementById('contactList');
  const contacts=[
    d.phone  &&{label:'Telepon',val:d.phone,href:`tel:${d.phone}`,cls:'ci-phone',icon:iconPhone()},
    d.email  &&{label:'Email',val:d.email,href:`mailto:${d.email}`,cls:'ci-email',icon:iconEmail()},
    d.website&&{label:'Website',val:d.website.replace(/^https?:\/\//,''),href:d.website,cls:'ci-web',icon:iconWeb(),ext:true},
    d.address&&{label:'Alamat',val:d.address,href:null,cls:'ci-addr',icon:iconPin()},
  ].filter(Boolean);
  if(contacts.length){
    document.getElementById('contactLabel').style.display='block';
    contacts.forEach(c=>{
      const div=document.createElement('div');
      div.className=`ci ${c.cls}${c.href?' link':''}`;
      const arr=c.href?`<svg class="ci-arr" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`:'';
      if(c.href&&!c.ext)div.onclick=()=>location.href=c.href;
      else if(c.href&&c.ext)div.onclick=()=>window.open(c.href,'_blank','noopener');
      div.innerHTML=`<div class="ci-icon">${c.icon}</div><div class="ci-body"><span class="ci-label">${c.label}</span><div class="ci-val">${esc(c.val)}</div></div>${arr}`;
      cl.appendChild(div);
    });
  }

  // Socials
  const sw=document.getElementById('socialWrap');
  const socials=[
    d.instagram&&{label:'Instagram',handle:'@'+d.instagram,href:`https://instagram.com/${d.instagram}`,icon:iconIG(),cls:'ig'},
    d.linkedin &&{label:'LinkedIn',handle:d.linkedin,href:`https://linkedin.com/in/${d.linkedin}`,icon:iconLI(),cls:'li'},
  ].filter(Boolean);
  if(socials.length){
    document.getElementById('socialLabel').style.display='block';
    sw.innerHTML='';
    const grp=document.createElement('div');grp.className='ios-group';
    socials.forEach(s=>{
      const a=document.createElement('a');
      a.className=`schip ${s.cls}`;a.href=s.href;a.target='_blank';a.rel='noopener';
      a.innerHTML=`<div class="schip-icon">${s.icon}</div><div><div style="font-size:.9rem;font-weight:500">${s.label}</div><div style="font-size:.75rem;color:var(--ios-label3);margin-top:1px">${esc(s.handle)}</div></div><svg class="schip-arr" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;
      grp.appendChild(a);
    });
    sw.appendChild(grp);sw.style.display='block';
  }
}

// ── Share (Web Share API, fallback copy link)
async function shareCard(){
  if(!D)return;
  const shareData={
    title:`${D.name} — ${D.company||'Kawan Baik Bali'}`,
    text:`${D.position||''} di ${D.company||'Kawan Baik Bali'}`,
    url:window.location.href
  };
  if(navigator.share&&navigator.canShare&&navigator.canShare(shareData)){
    try{await navigator.share(shareData);}catch(e){if(e.name!=='AbortError')copyLink();}
  } else {copyLink();}
}
function copyLink(){
  navigator.clipboard.writeText(window.location.href)
    .then(()=>toast('Link disalin ✓'))
    .catch(()=>toast('Gagal menyalin'));
}

function saveContact(){
  if(!D)return;
  const ig=D.instagram?`https://instagram.com/${D.instagram}`:'';
  const li=D.linkedin?`https://linkedin.com/in/${D.linkedin}`:'';
  const lines=[
    'BEGIN:VCARD','VERSION:3.0',
    `FN:${D.name||''}`,
    `N:${(D.name||'').split(' ').slice(1).join(' ')};${(D.name||'').split(' ')[0]};;;`,
    D.position?`TITLE:${D.position}`:'',
    D.company?`ORG:${D.company}`:'',
    D.phone?`TEL;TYPE=CELL:${D.phone}`:'',
    D.email?`EMAIL;TYPE=INTERNET:${D.email}`:'',
    D.website?`URL:${D.website}`:'',
    D.address?`ADR;TYPE=WORK:;;${D.address};;;;`:'',
    ig?`X-SOCIALPROFILE;TYPE=instagram:${ig}`:'',
    li?`X-SOCIALPROFILE;TYPE=linkedin:${li}`:'',
    D.tagline?`NOTE:${D.tagline}`:'',
    D.photo?`PHOTO;ENCODING=b;TYPE=JPEG:${D.photo.split(',')[1]||''}`:'',
    'END:VCARD'
  ].filter(Boolean).join('\r\n');
  const blob=new Blob([lines],{type:'text/vcard;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`${(D.name||'contact').replace(/\s/g,'_')}_KawanBaikBali.vcf`;
  a.click();URL.revokeObjectURL(url);
  toast('Kontak tersimpan ✓');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Scan tracking
function getDeviceInfo() {
  const ua = navigator.userAgent;
  let os = 'Other';
  if (/iPhone|iPad|iPod/.test(ua)) os = 'iOS';
  else if (/Android/.test(ua)) os = 'Android';
  else if (/Windows/.test(ua)) os = 'Windows';
  else if (/Mac/.test(ua)) os = 'macOS';
  else if (/Linux/.test(ua)) os = 'Linux';

  let device = 'desktop';
  if (/Mobi|Android|iPhone|iPod/.test(ua)) device = 'mobile';
  else if (/iPad|Tablet/.test(ua)) device = 'tablet';

  let referrer = 'direct';
  const ref = document.referrer;
  if (ref) {
    if (/whatsapp/i.test(ref)) referrer = 'whatsapp';
    else if (/instagram/i.test(ref)) referrer = 'instagram';
    else if (/linkedin/i.test(ref)) referrer = 'linkedin';
    else if (/google/i.test(ref)) referrer = 'google';
    else referrer = new URL(ref).hostname;
  }

  return { os, device, referrer };
}

async function trackView(card) {
  if (!card || !card.id) return;

  // ── Cooldown: 1 count per slug per device per 24 jam
  const storageKey = `cv_${card.slug}`;
  try {
    const last = localStorage.getItem(storageKey);
    const now = Date.now();
    if (last && (now - parseInt(last)) < 24 * 60 * 60 * 1000) return; // masih dalam 24 jam, skip
    localStorage.setItem(storageKey, now.toString());
  } catch(e) {
    // localStorage unavailable (private mode dll) — tetap track
  }

  try {
    const { os, device, referrer } = getDeviceInfo();
    await fetch(`${SUPA_URL}/rest/v1/card_views`, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        slug:     card.slug,
        device:   device === 'tablet' ? 'mobile' : device,
        referrer: referrer
      })
    });
  } catch(e) {
    // silent fail — tracking tidak boleh ganggu UX
  }
}
