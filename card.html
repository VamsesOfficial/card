<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F0D0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Digital Card — Kawan Baik Bali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0D0A;
  --bg2:#171411;
  --bg3:#1F1B17;
  --gold:#C9A96E;
  --gold2:#E8D5A3;
  --gold3:#7A5C2E;
  --rose:#C4756A;
  --teal:#5B9E8F;
  --text:#F2EDE6;
  --text2:#A89070;
  --text3:#5C4E3E;
  --border:rgba(201,169,110,0.18);
  --border2:rgba(201,169,110,0.07);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --t:0.25s cubic-bezier(.4,0,.2,1);
  --r:3px;
}
html{
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-weight:300;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow-x:hidden;
}

/* LOADING */
#loading{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:18px;z-index:200;
  transition:opacity 0.5s ease;
}
#loading.gone{opacity:0;pointer-events:none}
.lb{font-family:var(--serif);font-size:1.25rem;color:var(--gold);letter-spacing:0.1em;font-style:italic}
.ll{width:40px;height:1px;background:var(--border);position:relative;overflow:hidden}
.ll::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:sweep 1s ease infinite}
@keyframes sweep{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* NOT FOUND */
#notfound{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:40px 24px;text-align:center;gap:12px}
.nf-num{font-family:var(--serif);font-size:5rem;font-weight:300;color:var(--gold);opacity:0.15;line-height:1}
.nf-title{font-family:var(--serif);font-size:1.5rem;color:var(--text2);font-style:italic}
.nf-desc{font-size:0.75rem;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase}

/* CARD WRAP */
#cardWrap{
  display:none;width:100%;
  max-width:430px;
  animation:fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════
   HERO
═══════════════════════════════════ */
.hero{
  position:relative;
  padding:56px 28px 40px;
  overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
}
/* Layered gradient background */
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 90% 70% at 50% -10%, rgba(201,169,110,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 15% 100%, rgba(91,158,143,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 85% 80%, rgba(196,117,106,0.07) 0%, transparent 50%),
    linear-gradient(180deg, #1a1510 0%, var(--bg) 100%);
}
/* Subtle grid */
.hero-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(201,169,110,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,169,110,0.05) 1px,transparent 1px);
  background-size:32px 32px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 0%,black 20%,transparent 80%);
}
/* Glow */
.hero-glow{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:280px;height:200px;
  background:radial-gradient(ellipse,rgba(201,169,110,0.1) 0%,transparent 70%);
  pointer-events:none;
}

/* AVATAR */
.avatar-wrap{
  position:relative;z-index:1;
  margin-bottom:24px;
}
.avatar-frame{
  width:108px;height:108px;
  border-radius:50%;
  background:var(--bg3);
  border:1px solid var(--border);
  overflow:hidden;
  position:relative;
  box-shadow:
    0 0 0 4px rgba(201,169,110,0.08),
    0 0 0 8px rgba(201,169,110,0.04),
    0 20px 60px rgba(0,0,0,0.5);
}
.avatar-frame img{width:100%;height:100%;object-fit:cover;display:block}
.avatar-init{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:2.6rem;
  font-weight:300;color:var(--gold);font-style:italic;
}
/* Shimmer line on avatar */
.avatar-frame::after{
  content:'';
  position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 50%);
  pointer-events:none;
}
/* Status dot */
.avatar-dot{
  position:absolute;bottom:6px;right:6px;
  width:12px;height:12px;border-radius:50%;
  background:#4CAF50;
  border:2px solid var(--bg);
  box-shadow:0 0 8px rgba(76,175,80,0.5);
}

.hero-name{
  font-family:var(--serif);
  font-size:clamp(1.8rem,6vw,2.3rem);
  font-weight:400;
  letter-spacing:-0.01em;
  line-height:1.1;
  color:var(--text);
  position:relative;z-index:1;
  margin-bottom:10px;
}
.hero-pos{
  font-size:0.62rem;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--gold);
  font-weight:500;
  position:relative;z-index:1;
  margin-bottom:5px;
}
.hero-co{
  font-family:var(--serif);
  font-size:1rem;
  color:var(--text2);
  font-style:italic;
  position:relative;z-index:1;
}
/* Ornamental divider */
.hero-orn{
  display:flex;align-items:center;gap:10px;
  margin-top:18px;
  position:relative;z-index:1;
}
.hero-orn span{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);flex:1;max-width:60px;opacity:0.5}
.hero-orn i{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:0.6}

/* ═══════════════════════════════════
   TAGLINE
═══════════════════════════════════ */
.tagline{
  display:none;
  padding:20px 28px;
  background:linear-gradient(135deg,rgba(201,169,110,0.05),rgba(201,169,110,0.02));
  border-top:1px solid var(--border2);
  border-bottom:1px solid var(--border2);
  text-align:center;
  position:relative;
}
.tagline::before{
  content:'\201C';
  position:absolute;top:-28px;left:16px;
  font-family:var(--serif);font-size:7rem;
  color:var(--gold);opacity:0.06;line-height:1;pointer-events:none;
}
.tagline-text{
  font-family:var(--serif);font-size:1.05rem;
  font-style:italic;color:var(--text2);line-height:1.75;
}

/* ═══════════════════════════════════
   QUICK ACTIONS
═══════════════════════════════════ */
.actions{padding:20px 16px 0;background:var(--bg);display:flex;flex-direction:column;gap:8px}
.action-grid{display:grid;gap:8px}

.abtn{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
  padding:14px 6px;
  background:var(--bg2);
  border:1px solid rgba(201,169,110,0.12);
  color:var(--text2);
  font-family:var(--sans);
  font-size:0.57rem;letter-spacing:0.16em;
  text-transform:uppercase;text-decoration:none;
  cursor:pointer;transition:all var(--t);
  border-radius:var(--r);font-weight:400;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  min-height:64px;
}
/* Shimmer on hover */
.abtn::before{
  content:'';position:absolute;
  top:-50%;left:-60%;
  width:40%;height:200%;
  background:linear-gradient(105deg,transparent,rgba(201,169,110,0.08),transparent);
  transform:skewX(-15deg);
  transition:left 0.5s ease;
  pointer-events:none;
}
.abtn:hover::before{left:120%}
.abtn:hover,.abtn:active{
  border-color:rgba(201,169,110,0.4);
  color:var(--gold);
  background:rgba(201,169,110,0.05);
  transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.abtn:active{transform:translateY(0)}
.abtn svg{transition:transform var(--t)}
.abtn:hover svg{transform:scale(1.1)}

/* WA button — green tint */
.abtn.wa:hover{border-color:rgba(74,222,128,0.4);color:#4ade80;background:rgba(74,222,128,0.04)}
/* Email — blue tint */
.abtn.em:hover{border-color:rgba(96,165,250,0.4);color:#60a5fa;background:rgba(96,165,250,0.04)}
/* Web — teal tint */
.abtn.wb:hover{border-color:rgba(91,158,143,0.5);color:#5B9E8F;background:rgba(91,158,143,0.04)}

/* Primary CTA buttons */
.abtn.cta{
  flex-direction:row;gap:10px;
  padding:15px 20px;
  font-size:0.62rem;
  min-height:50px;
}
.abtn.cta-save{
  background:linear-gradient(135deg,rgba(201,169,110,0.12),rgba(201,169,110,0.06));
  border-color:rgba(201,169,110,0.35);
  color:var(--gold);
}
.abtn.cta-save:hover{
  background:linear-gradient(135deg,var(--gold3),rgba(201,169,110,0.3));
  border-color:var(--gold);
  color:var(--gold2);
  box-shadow:0 4px 24px rgba(201,169,110,0.15);
}
.abtn.cta-copy{
  background:var(--bg2);
  border-color:rgba(201,169,110,0.12);
}
.abtn.cta-copy:hover{
  background:var(--bg3);
  border-color:rgba(201,169,110,0.3);
  color:var(--text);
}

/* ═══════════════════════════════════
   SECTION LABEL
═══════════════════════════════════ */
.sec-label{
  font-size:0.55rem;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--text3);font-weight:500;
  padding:20px 16px 8px;background:var(--bg);
  display:flex;align-items:center;gap:10px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border2)}

/* ═══════════════════════════════════
   CONTACTS
═══════════════════════════════════ */
.contacts{background:var(--bg);padding:0 16px}
.ci{
  display:flex;align-items:center;gap:14px;
  padding:13px 0;
  border-bottom:1px solid var(--border2);
  text-decoration:none;color:inherit;
  transition:all var(--t);
  border-radius:var(--r);
  -webkit-tap-highlight-color:transparent;
  cursor:default;
}
.ci.link{cursor:pointer}
.ci:last-child{border-bottom:none}
.ci.link:hover{padding-left:4px}
.ci-icon{
  width:36px;height:36px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:var(--r);
  transition:all var(--t);
}
.ci-phone .ci-icon{color:#4ade80}
.ci-email .ci-icon{color:#60a5fa}
.ci-web .ci-icon{color:var(--teal)}
.ci-addr .ci-icon{color:var(--rose)}
.ci.link:hover .ci-icon{
  transform:scale(1.05);
  border-color:currentColor;
  background:rgba(255,255,255,0.04);
}
.ci-body{flex:1;min-width:0}
.ci-label{
  font-size:0.57rem;letter-spacing:0.16em;
  text-transform:uppercase;color:var(--text3);
  display:block;margin-bottom:2px;font-weight:400;
}
.ci-val{font-size:0.87rem;color:var(--text);word-break:break-word;font-weight:300;line-height:1.4}
.ci-arr{color:var(--text3);opacity:0;transition:opacity var(--t);flex-shrink:0}
.ci.link:hover .ci-arr{opacity:1}

/* ═══════════════════════════════════
   SOCIALS
═══════════════════════════════════ */
.socials{
  display:none;
  padding:4px 16px 16px;
  background:var(--bg);
  gap:8px;flex-wrap:wrap;
}
.schip{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:var(--r);
  color:var(--text2);text-decoration:none;
  font-size:0.62rem;letter-spacing:0.12em;
  text-transform:uppercase;font-weight:400;
  transition:all var(--t);font-family:var(--sans);
  -webkit-tap-highlight-color:transparent;
}
.schip.ig:hover{border-color:rgba(225,100,100,0.5);color:#f97066;background:rgba(225,100,100,0.05)}
.schip.li:hover{border-color:rgba(96,165,250,0.5);color:#60a5fa;background:rgba(96,165,250,0.05)}

/* ═══════════════════════════════════
   FOOTER
═══════════════════════════════════ */
.card-foot{
  padding:20px 20px 28px;
  background:linear-gradient(180deg,var(--bg) 0%,rgba(15,13,10,0.95) 100%);
  border-top:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;
  margin-top:16px;
}
.foot-left{}
.foot-brand{font-family:var(--serif);font-size:1.05rem;font-weight:400;color:var(--gold);font-style:italic}
.foot-sub{font-size:0.56rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-top:3px}
.foot-badge{
  display:flex;align-items:center;gap:6px;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:100px;
  padding:6px 12px;
}
.foot-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:0.7;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
.foot-badge-text{font-size:0.57rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3)}

/* ═══════════════════════════════════
   TOAST
═══════════════════════════════════ */
.toast{
  position:fixed;bottom:max(24px,env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--bg3);
  border:1px solid var(--border);
  color:var(--gold);
  padding:10px 20px;
  font-size:0.72rem;letter-spacing:0.08em;
  border-radius:100px;
  opacity:0;transition:all 0.25s ease;
  pointer-events:none;z-index:999;
  font-family:var(--sans);white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══════════════════════════════════
   RESPONSIVE TWEAKS
═══════════════════════════════════ */
@media(max-width:360px){
  .hero-name{font-size:1.6rem}
  .abtn{padding:12px 4px;min-height:58px}
}
@media(min-width:430px){
  #cardWrap{border-left:1px solid var(--border2);border-right:1px solid var(--border2)}
}
/* Safe area for notch phones */
.hero{padding-top:max(56px,calc(40px + env(safe-area-inset-top)))}
</style>
</head>
<body>

<div id="loading">
  <div class="lb">Kawan Baik Bali</div>
  <div class="ll"></div>
</div>

<div id="notfound">
  <div class="nf-num">404</div>
  <h2 class="nf-title">Card tidak ditemukan</h2>
  <p class="nf-desc">Link tidak aktif atau sudah dihapus</p>
</div>

<div id="cardWrap">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>
    <div class="hero-glow"></div>

    <div class="avatar-wrap">
      <div class="avatar-frame" id="avatarFrame">
        <div class="avatar-init" id="avatarInit">K</div>
      </div>
      <div class="avatar-dot"></div>
    </div>

    <h1 class="hero-name" id="pName">—</h1>
    <p class="hero-pos" id="pPos"></p>
    <p class="hero-co" id="pCo">Kawan Baik Bali</p>

    <div class="hero-orn">
      <span></span>
      <i></i>
      <span></span>
    </div>
  </div>

  <!-- TAGLINE -->
  <div class="tagline" id="taglineWrap">
    <p class="tagline-text" id="taglineText"></p>
  </div>

  <!-- QUICK ACTIONS -->
  <div class="actions">
    <div class="action-grid" id="grid3" style="grid-template-columns:repeat(3,1fr)"></div>
    <div class="action-grid" style="grid-template-columns:1fr 1fr">
      <button class="abtn cta cta-save" onclick="saveContact()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Save Contact
      </button>
      <button class="abtn cta cta-copy" onclick="copyInfo()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Info
      </button>
    </div>
  </div>

  <!-- CONTACTS -->
  <div class="sec-label" id="contactLabel" style="display:none">Kontak</div>
  <div class="contacts" id="contactList"></div>

  <!-- SOCIALS -->
  <div class="sec-label" id="socialLabel" style="display:none">Sosial Media</div>
  <div class="socials" id="socialWrap"></div>

  <!-- FOOTER -->
  <div class="card-foot">
    <div class="foot-left">
      <div class="foot-brand">Kawan Baik Bali</div>
      <div class="foot-sub">Hospitality Supplier · Bali</div>
    </div>
    <div class="foot-badge">
      <div class="foot-badge-dot"></div>
      <div class="foot-badge-text">Digital Card</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://uyjkarfzkngamepxvpvd.supabase.co';
const SUPA_KEY = 'sb_publishable_nWlelzglezZOa6rU5fXqBw_V93XVlCY';
let D = null;

function getSlug(){
  return window.location.pathname.replace(/^\/+|\/+$/g,'') || null;
}

async function fetchCard(slug){
  const res = await fetch(`${SUPA_URL}/rest/v1/cards?slug=eq.${encodeURIComponent(slug)}&select=*&limit=1`,{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
  });
  if(!res.ok) throw new Error('fetch error');
  const data = await res.json();
  return data&&data.length?data[0]:null;
}

window.addEventListener('DOMContentLoaded',async()=>{
  const slug=getSlug();
  if(!slug){showNotFound();return;}
  try{
    D=await fetchCard(slug);
    document.getElementById('loading').classList.add('gone');
    if(!D){showNotFound();return;}
    renderCard(D);
    document.getElementById('cardWrap').style.display='block';
  }catch(e){
    document.getElementById('loading').classList.add('gone');
    showNotFound();
  }
});

function showNotFound(){
  setTimeout(()=>{
    document.getElementById('loading').classList.add('gone');
    document.getElementById('notfound').style.display='flex';
  },400);
}

function renderCard(d){
  document.title=`${d.name||'Card'} — ${d.company||'Kawan Baik Bali'}`;

  // Avatar
  const frame=document.getElementById('avatarFrame');
  if(d.photo){
    frame.innerHTML=`<img src="${d.photo}" alt="${esc(d.name)}">`;
  } else {
    document.getElementById('avatarInit').textContent=(d.name||'K').charAt(0).toUpperCase();
  }

  document.getElementById('pName').textContent=d.name||'—';
  document.getElementById('pPos').textContent=d.position||'';
  document.getElementById('pCo').textContent=d.company||'Kawan Baik Bali';

  if(d.tagline){
    document.getElementById('taglineText').textContent=d.tagline;
    document.getElementById('taglineWrap').style.display='block';
  }

  // Quick action buttons
  const waNum=d.whatsapp
    ?'62'+d.whatsapp.replace(/\D/g,'').replace(/^62/,'')
    :(d.phone?d.phone.replace(/\D/g,''):'');
  const btns=[];
  if(waNum) btns.push({label:'WhatsApp',href:`https://wa.me/${waNum}`,icon:iconWA(),cls:'wa'});
  if(d.email) btns.push({label:'Email',href:`mailto:${d.email}`,icon:iconEmail(),cls:'em'});
  if(d.website) btns.push({label:'Website',href:d.website,icon:iconWeb(),cls:'wb',ext:true});

  const g3=document.getElementById('grid3');
  if(!btns.length){g3.style.display='none';}
  else{
    g3.style.gridTemplateColumns=`repeat(${Math.min(btns.length,3)},1fr)`;
    btns.forEach(b=>{
      const a=document.createElement('a');
      a.className=`abtn ${b.cls}`;
      a.href=b.href;
      if(b.ext||b.href.startsWith('http')){a.target='_blank';a.rel='noopener';}
      a.innerHTML=b.icon+`<span>${b.label}</span>`;
      g3.appendChild(a);
    });
  }

  // Contact list
  const cl=document.getElementById('contactList');
  const contacts=[
    d.phone  &&{label:'Telepon', val:d.phone,  href:`tel:${d.phone}`,   cls:'ci-phone', icon:iconPhone()},
    d.email  &&{label:'Email',   val:d.email,  href:`mailto:${d.email}`,cls:'ci-email', icon:iconEmail()},
    d.website&&{label:'Website', val:d.website.replace(/^https?:\/\//,''),href:d.website,cls:'ci-web',icon:iconWeb(),ext:true},
    d.address&&{label:'Alamat',  val:d.address,href:null,                cls:'ci-addr', icon:iconPin()},
  ].filter(Boolean);

  if(contacts.length){
    document.getElementById('contactLabel').style.display='flex';
    contacts.forEach(c=>{
      const div=document.createElement('div');
      div.className=`ci ${c.cls}${c.href?' link':''}`;
      const arr=c.href?`<svg class="ci-arr" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>`:'';
      if(c.href&&!c.ext){
        div.onclick=()=>location.href=c.href;
      } else if(c.href&&c.ext){
        div.onclick=()=>window.open(c.href,'_blank','noopener');
      }
      div.innerHTML=`<div class="ci-icon">${c.icon}</div><div class="ci-body"><span class="ci-label">${c.label}</span><div class="ci-val">${esc(c.val)}</div></div>${arr}`;
      cl.appendChild(div);
    });
  }

  // Socials
  const sw=document.getElementById('socialWrap');
  const socials=[
    d.instagram&&{label:'Instagram',href:`https://instagram.com/${d.instagram}`,icon:iconIG(),cls:'ig'},
    d.linkedin &&{label:'LinkedIn', href:`https://linkedin.com/in/${d.linkedin}`, icon:iconLI(),cls:'li'},
  ].filter(Boolean);
  if(socials.length){
    document.getElementById('socialLabel').style.display='flex';
    socials.forEach(s=>{
      const a=document.createElement('a');
      a.className=`schip ${s.cls}`;
      a.href=s.href;a.target='_blank';a.rel='noopener';
      a.innerHTML=s.icon+`<span>${s.label}</span>`;
      sw.appendChild(a);
    });
    sw.style.display='flex';
  }
}

function saveContact(){
  if(!D)return;
  const ig=D.instagram?`https://instagram.com/${D.instagram}`:'';
  const li=D.linkedin ?`https://linkedin.com/in/${D.linkedin}`:'';
  const lines=[
    'BEGIN:VCARD','VERSION:3.0',
    `FN:${D.name||''}`,
    `N:${(D.name||'').split(' ').slice(1).join(' ')};${(D.name||'').split(' ')[0]};;;`,
    D.position?`TITLE:${D.position}`:'',
    D.company ?`ORG:${D.company}`:'',
    D.phone   ?`TEL;TYPE=CELL:${D.phone}`:'',
    D.email   ?`EMAIL;TYPE=INTERNET:${D.email}`:'',
    D.website ?`URL:${D.website}`:'',
    D.address ?`ADR;TYPE=WORK:;;${D.address};;;;`:'',
    ig        ?`X-SOCIALPROFILE;TYPE=instagram:${ig}`:'',
    li        ?`X-SOCIALPROFILE;TYPE=linkedin:${li}`:'',
    D.tagline ?`NOTE:${D.tagline}`:'',
    D.photo   ?`PHOTO;ENCODING=b;TYPE=JPEG:${D.photo.split(',')[1]||''}`:'',
    'END:VCARD'
  ].filter(Boolean).join('\r\n');
  const blob=new Blob([lines],{type:'text/vcard;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`${(D.name||'contact').replace(/\s/g,'_')}_KawanBaikBali.vcf`;
  a.click();URL.revokeObjectURL(url);
  toast('Kontak tersimpan ✓');
}

function copyInfo(){
  if(!D)return;
  const parts=[
    D.name,
    [D.position,D.company].filter(Boolean).join(' — '),
    D.phone  ?`Tel: ${D.phone}`:'',
    D.email  ?`Email: ${D.email}`:'',
    D.website?`Web: ${D.website}`:'',
    D.address?`Alamat: ${D.address}`:'',
  ].filter(Boolean);
  navigator.clipboard.writeText(parts.join('\n'))
    .then(()=>toast('Info disalin ✓'))
    .catch(()=>toast('Gagal menyalin'));
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
