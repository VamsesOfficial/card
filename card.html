<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F7F3EE">
<title>Digital Card — Kawan Baik Bali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --w:#F7F3EE;--b:#EDE8E0;--bm:#E3DDD4;
  --c:#2C2825;--cs:#4A4441;
  --a:#C4A882;--al:#D9C4A8;
  --br:rgba(44,40,37,0.12);--brs:rgba(44,40,37,0.22);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --r:2px;--t:0.22s ease;
}
@media(prefers-color-scheme:dark){:root{
  --w:#1A1816;--b:#242220;--bm:#2C2A27;
  --c:#F0EBE4;--cs:#B8AFA6;
  --br:rgba(240,235,228,0.1);--brs:rgba(240,235,228,0.18);
}}
html{font-size:16px}
body{background:var(--w);color:var(--c);font-family:var(--sans);font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 60px}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--w);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:100;transition:opacity 0.4s ease}
#loading.gone{opacity:0;pointer-events:none}
.lb{font-family:var(--serif);font-size:1.4rem;color:var(--a)}
.ll{width:40px;height:1px;background:var(--br);position:relative;overflow:hidden}
.ll::after{content:'';position:absolute;inset:0;background:var(--a);animation:ls 0.9s ease infinite}
@keyframes ls{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* NOT FOUND */
#notfound{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:40px 24px;text-align:center;gap:14px}
.nf-icon{color:var(--a);opacity:0.4;margin-bottom:6px}
.nf-title{font-family:var(--serif);font-size:1.6rem;font-weight:300}
.nf-desc{font-size:0.82rem;color:var(--cs);max-width:260px;line-height:1.6}

/* CARD */
#cardWrap{display:none;width:100%;max-width:460px;animation:reveal 0.55s ease both}
@keyframes reveal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* TOP BAR */
.topbar{background:var(--c);padding:15px 28px;display:flex;align-items:center;justify-content:space-between;width:100%}
.topbar-brand{font-family:var(--serif);font-size:1rem;font-weight:400;color:var(--a);letter-spacing:0.04em}
.topbar-tag{font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(240,235,228,0.4);font-weight:300}

/* PROFILE */
.profile{padding:44px 28px 30px;text-align:center;border-bottom:1px solid var(--br)}
.avatar-ring{width:100px;height:100px;border-radius:50%;border:1px solid var(--brs);overflow:hidden;margin:0 auto 22px;background:var(--b);position:relative}
.avatar-ring::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--a);opacity:0.25;pointer-events:none}
.avatar-ring img{width:100%;height:100%;object-fit:cover}
.avatar-init{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:2.2rem;font-weight:400;color:var(--a)}
.p-name{font-family:var(--serif);font-size:1.95rem;font-weight:400;letter-spacing:-0.01em;line-height:1.2;margin-bottom:8px}
.p-pos{font-size:0.71rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--cs);font-weight:400;margin-bottom:5px}
.p-co{font-family:var(--serif);font-size:1.05rem;color:var(--a);font-style:italic;font-weight:300}

/* TAGLINE */
.tagline{padding:22px 28px;border-bottom:1px solid var(--br);display:none}
.tagline-text{font-family:var(--serif);font-size:1rem;font-weight:300;font-style:italic;color:var(--cs);line-height:1.75;text-align:center}
.tagline-text::before{content:'\201C';color:var(--a);margin-right:2px}
.tagline-text::after{content:'\201D';color:var(--a);margin-left:2px}

/* ACTIONS */
.actions{padding:22px 20px 0}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:9px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.abtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:15px 6px;background:transparent;border:1px solid var(--br);color:var(--c);font-family:var(--sans);font-size:0.63rem;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:all var(--t);border-radius:var(--r);font-weight:400;-webkit-tap-highlight-color:transparent}
.abtn:hover,.abtn:active{border-color:var(--a);color:var(--a);background:rgba(196,168,130,0.05)}
.abtn.dark{background:var(--c);color:var(--w);border-color:var(--c);flex-direction:row;justify-content:center;gap:9px}
.abtn.dark:hover{background:var(--a);border-color:var(--a);color:var(--c)}

/* CONTACT */
.contacts{margin-top:18px;border-top:1px solid var(--br);padding:0 20px}
.ci{display:flex;align-items:flex-start;gap:13px;padding:13px 0;border-bottom:1px solid var(--br)}
.ci:last-child{border-bottom:none}
.ci-icon{width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--a);margin-top:1px}
.ci-body{flex:1;min-width:0}
.ci-label{font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--cs);display:block;margin-bottom:3px;font-weight:400}
.ci-val{font-size:0.88rem;color:var(--c);word-break:break-word;font-weight:300;line-height:1.4}
.ci-val a{color:inherit;text-decoration:none;transition:color var(--t)}
.ci-val a:hover{color:var(--a)}

/* SOCIAL */
.socials{padding:14px 20px 18px;border-top:1px solid var(--br);display:flex;gap:9px;flex-wrap:wrap;display:none}
.schip{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border:1px solid var(--br);border-radius:var(--r);color:var(--c);text-decoration:none;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:400;transition:all var(--t);font-family:var(--sans);-webkit-tap-highlight-color:transparent}
.schip:hover{border-color:var(--a);color:var(--a)}

/* FOOTER */
.card-foot{padding:18px 28px;border-top:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.foot-brand{font-family:var(--serif);font-size:0.95rem;font-weight:500;color:var(--a)}
.foot-sub{font-size:0.6rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--cs);margin-top:2px}
.foot-dot{width:5px;height:5px;border-radius:50%;background:var(--a);opacity:0.35}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--c);color:var(--w);padding:10px 20px;font-size:0.75rem;letter-spacing:0.06em;border-radius:var(--r);opacity:0;transition:all 0.25s ease;pointer-events:none;z-index:999;font-family:var(--sans);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="loading">
  <div class="lb">Kawan Baik Bali</div>
  <div class="ll"></div>
</div>

<div id="notfound">
  <div class="nf-icon">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
  </div>
  <h2 class="nf-title">Card tidak ditemukan</h2>
  <p class="nf-desc">Halaman ini tidak tersedia atau link sudah tidak aktif.</p>
</div>

<div id="cardWrap">
  <div class="topbar">
    <div class="topbar-brand">Kawan Baik Bali</div>
    <div class="topbar-tag">Digital Card</div>
  </div>

  <div class="profile">
    <div class="avatar-ring" id="avatarRing">
      <div class="avatar-init" id="avatarInit">K</div>
    </div>
    <h1 class="p-name" id="pName">—</h1>
    <p class="p-pos" id="pPos"></p>
    <p class="p-co" id="pCo">Kawan Baik Bali</p>
  </div>

  <div class="tagline" id="taglineWrap">
    <p class="tagline-text" id="taglineText"></p>
  </div>

  <div class="actions">
    <div class="grid3" id="grid3"></div>
    <div class="grid2">
      <button class="abtn dark" onclick="saveContact()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Save Contact
      </button>
      <button class="abtn" onclick="copyInfo()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Info
      </button>
    </div>
  </div>

  <div class="contacts" id="contactList"></div>
  <div class="socials" id="socialWrap"></div>

  <div class="card-foot">
    <div>
      <div class="foot-brand">Kawan Baik Bali</div>
      <div class="foot-sub">Hospitality Supplier Premium · Bali</div>
    </div>
    <div class="foot-dot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://uyjkarfzkngamepxvpvd.supabase.co';
const SUPA_KEY = 'sb_publishable_nWlelzglezZOa6rU5fXqBw_V93XVlCY';

let D = null;

// ── Get slug from URL path
// URL: card.kawanbaikbali.com/dewi → slug = "dewi"
function getSlug() {
  const path = window.location.pathname.replace(/^\/+|\/+$/g, '');
  return path || null;
}

// ── Fetch from Supabase
async function fetchCard(slug) {
  const res = await fetch(`${SUPA_URL}/rest/v1/cards?slug=eq.${encodeURIComponent(slug)}&select=*&limit=1`, {
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY
    }
  });
  if (!res.ok) throw new Error('fetch error');
  const data = await res.json();
  return data && data.length ? data[0] : null;
}

// ── Init
window.addEventListener('DOMContentLoaded', async () => {
  const slug = getSlug();
  if (!slug) {
    hide();
    return;
  }
  try {
    D = await fetchCard(slug);
    document.getElementById('loading').classList.add('gone');
    if (!D) { show('notfound'); return; }
    renderCard(D);
    show('card');
  } catch(e) {
    document.getElementById('loading').classList.add('gone');
    show('notfound');
  }
});

function hide() {
  setTimeout(() => {
    document.getElementById('loading').classList.add('gone');
    show('notfound');
  }, 600);
}

function show(which) {
  if (which === 'notfound') {
    document.getElementById('notfound').style.display = 'flex';
  } else {
    document.getElementById('cardWrap').style.display = 'block';
  }
}

// ── Render
function renderCard(d) {
  // Meta
  document.title = `${d.name || 'Card'} — ${d.company || 'Kawan Baik Bali'}`;

  // Avatar
  const ring = document.getElementById('avatarRing');
  if (d.photo) {
    ring.innerHTML = `<img src="${d.photo}" alt="${esc(d.name)}">`;
  } else {
    document.getElementById('avatarInit').textContent = (d.name || 'K').charAt(0).toUpperCase();
  }

  document.getElementById('pName').textContent = d.name || '—';
  document.getElementById('pPos').textContent = d.position || '';
  document.getElementById('pCo').textContent = d.company || 'Kawan Baik Bali';

  // Tagline
  if (d.tagline) {
    document.getElementById('taglineText').textContent = d.tagline;
    document.getElementById('taglineWrap').style.display = 'block';
  }

  // Primary action buttons
  const waNum = d.whatsapp
    ? '62' + d.whatsapp.replace(/\D/g,'')
    : (d.phone ? d.phone.replace(/\D/g,'') : '');

  const btns = [];
  if (waNum) btns.push({ label:'WhatsApp', href:`https://wa.me/${waNum}`, icon: iconWA() });
  if (d.email) btns.push({ label:'Email', href:`mailto:${d.email}`, icon: iconEmail() });
  if (d.website) btns.push({ label:'Website', href:d.website, icon: iconWeb(), ext:true });

  const g3 = document.getElementById('grid3');
  if (btns.length < 3) g3.style.gridTemplateColumns = `repeat(${btns.length||1},1fr)`;
  btns.forEach(b => {
    const a = document.createElement('a');
    a.className = 'abtn';
    a.href = b.href;
    if (b.ext || b.href.startsWith('http')) { a.target='_blank'; a.rel='noopener'; }
    a.innerHTML = b.icon + `<span>${b.label}</span>`;
    g3.appendChild(a);
  });

  // Contact list
  const cl = document.getElementById('contactList');
  const contacts = [
    d.phone   && { label:'Telepon',  val:d.phone,   href:`tel:${d.phone}`,     icon:iconPhone() },
    d.email   && { label:'Email',    val:d.email,   href:`mailto:${d.email}`,  icon:iconEmail() },
    d.website && { label:'Website',  val:d.website.replace(/^https?:\/\//,''), href:d.website, icon:iconWeb(), ext:true },
    d.address && { label:'Alamat',   val:d.address, href:null,                 icon:iconPin() },
  ].filter(Boolean);

  contacts.forEach(c => {
    const div = document.createElement('div');
    div.className = 'ci';
    const val = c.href
      ? `<a href="${esc(c.href)}"${c.ext?' target="_blank" rel="noopener"':''}>${esc(c.val)}</a>`
      : esc(c.val);
    div.innerHTML = `<div class="ci-icon">${c.icon}</div><div class="ci-body"><span class="ci-label">${c.label}</span><div class="ci-val">${val}</div></div>`;
    cl.appendChild(div);
  });

  // Socials
  const sw = document.getElementById('socialWrap');
  const socials = [
    d.instagram && { label:'Instagram', href:`https://instagram.com/${d.instagram}`, icon:iconIG() },
    d.linkedin  && { label:'LinkedIn',  href:`https://linkedin.com/in/${d.linkedin}`, icon:iconLI() },
  ].filter(Boolean);

  if (socials.length) {
    socials.forEach(s => {
      const a = document.createElement('a');
      a.className = 'schip';
      a.href = s.href; a.target='_blank'; a.rel='noopener';
      a.innerHTML = s.icon + `<span>${s.label}</span>`;
      sw.appendChild(a);
    });
    sw.style.display = 'flex';
  }
}

// ── Save contact (.vcf)
function saveContact() {
  if (!D) return;
  const ig = D.instagram ? `https://instagram.com/${D.instagram}` : '';
  const li = D.linkedin  ? `https://linkedin.com/in/${D.linkedin}` : '';
  const lines = [
    'BEGIN:VCARD','VERSION:3.0',
    `FN:${D.name||''}`,
    `N:${(D.name||'').split(' ').slice(1).join(' ')};${(D.name||'').split(' ')[0]};;;`,
    D.position ? `TITLE:${D.position}` : '',
    D.company  ? `ORG:${D.company}` : '',
    D.phone    ? `TEL;TYPE=CELL:${D.phone}` : '',
    D.email    ? `EMAIL;TYPE=INTERNET:${D.email}` : '',
    D.website  ? `URL:${D.website}` : '',
    D.address  ? `ADR;TYPE=WORK:;;${D.address};;;;` : '',
    ig         ? `X-SOCIALPROFILE;TYPE=instagram:${ig}` : '',
    li         ? `X-SOCIALPROFILE;TYPE=linkedin:${li}` : '',
    D.tagline  ? `NOTE:${D.tagline}` : '',
    D.photo    ? `PHOTO;ENCODING=b;TYPE=JPEG:${D.photo.split(',')[1]||''}` : '',
    'END:VCARD'
  ].filter(Boolean).join('\r\n');

  const blob = new Blob([lines], {type:'text/vcard;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(D.name||'contact').replace(/\s/g,'_')}_KawanBaikBali.vcf`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Kontak tersimpan ✓');
}

// ── Copy info
function copyInfo() {
  if (!D) return;
  const parts = [
    D.name,
    [D.position, D.company].filter(Boolean).join(' — '),
    D.phone   ? `Tel: ${D.phone}` : '',
    D.email   ? `Email: ${D.email}` : '',
    D.website ? `Web: ${D.website}` : '',
    D.address ? `Alamat: ${D.address}` : '',
  ].filter(Boolean);
  navigator.clipboard.writeText(parts.join('\n'))
    .then(() => toast('Info disalin ✓'))
    .catch(() => toast('Gagal menyalin'));
}

// ── Toast
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Escape
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Icons
function iconWA()    { return `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>`; }
function iconEmail() { return `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`; }
function iconWeb()   { return `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`; }
function iconPhone() { return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3.06A2 2 0 0 1 8.64 4a12.06 12.06 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.19 6.19l.99-.98a2 2 0 0 1 2.11-.45 12.06 12.06 0 0 0 2.81.7A2 2 0 0 1 22 17v-.08z"/></svg>`; }
function iconPin()   { return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`; }
function iconIG()    { return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`; }
function iconLI()    { return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>`; }
</script>
</body>
</html>
